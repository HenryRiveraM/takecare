name: Build Sanity Check

on:
  push:
    branches:
      - main
      - hotfix
      - develop
      - release
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop, release ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Compile Backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Make mvnw executable
      working-directory: ./backend
      run: chmod +x mvnw
  
    - name: Build backend with Maven
      working-directory: ./backend
      run: ./mvnw clean compile --no-transfer-progress -q

    - name: ✅ Build successful
      if: success()
      run: echo "Backend compiled successfully!"

    - name: ❌ Build failed
      if: failure()
      run: |
        echo "Build compilation failed! Please fix the errors before pushing."
        exit 1

  frontend-build:
    runs-on: ubuntu-latest
    name: Compile Frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: ✅ Frontend build successful
      if: success()
      run: echo "Frontend compiled successfully!"

    - name: ❌ Frontend build failed
      if: failure()
      run: |
        echo "Frontend compilation failed! Please fix the errors before pushing."
        exit 1
