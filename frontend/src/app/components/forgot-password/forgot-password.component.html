<div class="recovery-wrapper">
  <div class="recovery-card">
    <div class="header-icon">
      <i class="fas fa-key"></i>
    </div>
    
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">
      No te preocupes, dinos el correo asociado a tu cuenta y te enviaremos las instrucciones.
    </p>

    <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()">
      <div class="input-container">
        <label>Correo Electrónico</label>
        <div class="field" [class.error]="submitted && f['email'].errors">
          <i class="far fa-envelope"></i>
          <input 
            type="email" 
            placeholder="example@email.com" 
            formControlName="email"
          >
        </div>
        <div *ngIf="submitted && f['email'].errors" class="error-text">
          <small *ngIf="f['email'].errors['required']">El correo es necesario</small>
          <small *ngIf="f['email'].errors['email']">Formato de correo inválido</small>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Enviando...' : 'Enviar enlace' }}
      </button>

      <div class="back-link">
        <a routerLink="/login">
          <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
        </a>
      </div>
    </form>

    <div class="secure-footer">
      <i class="fas fa-shield-alt"></i> SECURE RECOVERY
    </div>
  </div>
</div>
