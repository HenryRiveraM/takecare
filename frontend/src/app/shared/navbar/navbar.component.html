<header *ngIf="showNavbar" class="navbar">

  <div class="logo" routerLink="/">
    <img src="assets/images/logo.png" alt="Take Care" />
  </div>

  <nav class="links">
    <a routerLink="/">{{ 'navbar.home' | translate }}</a>
    <a routerLink="/">{{ 'navbar.about' | translate }}</a>
  </nav>

  <div class="actions">

    <select
      class="lang-select"
      [value]="languageService.getCurrentLanguage()"
      (change)="changeLanguage($event)">
      <option value="es">ES</option>
      <option value="en">EN</option>
    </select>

    <a routerLink="/login" class="btn-outline">
      {{ 'navbar.login' | translate }}
    </a>

    <a routerLink="/register-role" class="btn-primary">
      {{ 'navbar.register' | translate }}
    </a>

  </div>

</header>
