<div class="home">
    <section class="hero">
        <div class="hero-text">
            <span class="tag">Registro Profesional</span>
            <h1>Crea tu cuenta de Especialista</h1>
            <p>Únete a nuestra comunidad y comienza a brindar apoyo terapéutico.</p>
        </div>
    </section>

    <div class="card form-container">
        <form>
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" class="btn-secondary field" placeholder="Ej: Dr. Carla Pérez">
            </div>

            <div class="row-group">
                <div class="input-group flex-3">
                    <label>Carnet de Identidad</label>
                    <input type="text" class="btn-secondary field" placeholder="Número de CI">
                </div>
                <div class="input-group flex-1">
                    <label>Compl.</label>
                    <input type="text" class="btn-secondary field" placeholder="Ej: 1A">
                </div>
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" class="btn-secondary field" placeholder="correo@ejemplo.com">
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" class="btn-secondary field" placeholder="Mínimo 8 caracteres">
            </div>

            <div class="input-group">
                <label>Especialidad Médica</label>
                <select class="btn-secondary field">
                    <option value="" disabled selected>Selecciona tu especialidad</option>
                    <option value="clinica">Psicología Clínica</option>
                    <option value="psiquiatria">Psiquiatría</option>
                    <option value="infantil">Psicología Infantil</option>
                </select>
            </div>

            <div class="input-group">
                <label>Biografía Profesional</label>
                <textarea class="btn-secondary field" rows="3" placeholder="Cuéntanos sobre tu experiencia..."></textarea>
            </div>

            <div class="input-group">
                <label>Certificaciones Profesionales (Solo PDF)</label>
                <input type="file" class="btn-secondary field" accept=".pdf">
            </div>

            <button type="submit" class="btn-primary big full-width">
                Registrarme como Especialista
            </button>
        </form>
    </div>
</div>
