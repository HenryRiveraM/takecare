<div class="dashboard">
  <aside class="sidebar">

    <div class="logo">
      <img src="assets/images/logo.png" alt="logo">
      <span>TakeCare</span>
    </div>

    <div class="menu">
      <div class="menu-item active">Dashboard</div>
      <div class="menu-item">Agenda</div>
      <div class="menu-item">Pacientes</div>
      <div class="menu-item">Mensajes</div>
      <div class="menu-item" routerLink="/specialist/profile">Editar perfil</div>
    </div>

  </aside>

  <div class="main">
    <div class="header">
      <input class="search" placeholder="Buscar pacientes..." />
      <button class="btn-primary">Nueva sesión</button>
    </div>

    <div class="content">

      <div class="hero-dashboard">
        <div>
          <span class="tag">Panel especialista</span>
          <h1>Bienvenido {{ user?.names }} </h1>
          <p>Tu espacio profesional en TakeCare</p>
        </div>

        <img src="assets/images/especialista.png" alt="especialista">
      </div>

      <div class="stats">

        <div class="card">
          <h3>0</h3>
          <p>Pacientes</p>
        </div>

        <div class="card">
          <h3>0</h3>
          <p>Sesiones hoy</p>
        </div>

        <div class="card">
          <h3>0</h3>
          <p>Solicitudes</p>
        </div>

      </div>

      <div class="section">
        <h2>Próximas citas</h2>
        <p>Aquí se mostrarán las sesiones del especialista.</p>
      </div>

    </div>

  </div>

</div>
