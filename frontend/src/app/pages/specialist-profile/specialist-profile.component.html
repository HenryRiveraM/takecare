<div class="profile-page">
  <div class="container">

    <button type="button" class="back-btn" (click)="goBackToProfile()">
      ← {{ 'specialistProfile.back' | translate }}
    </button>

    <!-- HEADER -->
    <div class="profile-header">

      <div class="avatar">
        <img src="assets/images/especialista.png" alt="perfil">
      </div>

      <div>
        <span class="tag">{{ 'specialistProfile.tag' | translate }}</span>
        <h1>{{ 'specialistProfile.title' | translate }}</h1>
        <p>{{ 'specialistProfile.subtitle' | translate }}</p>
      </div>
    </div>

    <div *ngIf="loading" class="info-message">
      {{ 'specialistProfile.loading' | translate }}
    </div>

    <div *ngIf="errorMsg" class="error">
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="save()" class="form" *ngIf="!loading">

      <div class="grid">

        <div class="field">
          <label>{{ 'specialistProfile.fields.names' | translate }}</label>
          <div class="input-group">
            <span class="material-symbols-outlined">person</span>
            <input [(ngModel)]="profile.names" name="names" [readonly]="!isEditing"/>
          </div>
        </div>

        <div class="field">
          <label>{{ 'specialistProfile.fields.firstLastname' | translate }}</label>
          <div class="input-group">
            <span class="material-symbols-outlined">person</span>
            <input [(ngModel)]="profile.firstLastname" name="firstLastname" [readonly]="!isEditing"/>
          </div>
        </div>

        <div class="field">
          <label>{{ 'specialistProfile.fields.secondLastname' | translate }}</label>
          <div class="input-group">
            <span class="material-symbols-outlined">person</span>
            <input 
              [(ngModel)]="profile.secondLastname"
              name="secondLastname"
              [placeholder]="'specialistProfile.placeholders.secondLastname' | translate"
              [readonly]="!isEditing"/>
          </div>
        </div>

        <div class="field">
          <label>{{ 'specialistProfile.fields.email' | translate }}</label>
          <div class="input-group">
            <span class="material-symbols-outlined">mail</span>
            <input [(ngModel)]="profile.email" name="email" type="email" readonly/>
          </div>
        </div>

        <div class="field full">
          <label>{{ 'specialistProfile.fields.biography' | translate }}</label>
          <textarea
            [(ngModel)]="profile.biography"
            name="biography"
            [placeholder]="'specialistProfile.placeholders.biography' | translate"
            [readonly]="!isEditing">
          </textarea>
        </div>

        <div class="field">
          <label>{{ 'specialistProfile.fields.office' | translate }}</label>
          <div class="input-group">
            <span class="material-symbols-outlined">location_on</span>
            <input
              [(ngModel)]="profile.officeUbi"
              name="officeUbi"
              [placeholder]="'specialistProfile.placeholders.office' | translate"
              [readonly]="!isEditing"/>
          </div>
        </div>

        <div class="field">
          <label>{{ 'specialistProfile.fields.cost' | translate }}</label>
          <div class="input-group">
            <span class="material-symbols-outlined">payments</span>
            <input
              [(ngModel)]="profile.sessionCost"
              name="sessionCost"
              type="number"
              min="0"
              [placeholder]="'specialistProfile.placeholders.cost' | translate"
              [readonly]="!isEditing"/>
          </div>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions" *ngIf="!isEditing">
        <button class="btn-primary" type="button" (click)="enableEdit()">
          {{ 'specialistProfile.buttons.edit' | translate }}
        </button>
      </div>

      <div class="actions" *ngIf="isEditing">
        <button class="btn-secondary" type="button" (click)="cancelEdit()">
          {{ 'specialistProfile.buttons.cancel' | translate }}
        </button>

        <button class="btn-primary" type="submit" [disabled]="loading">
          {{ 'specialistProfile.buttons.save' | translate }}
        </button>
      </div>

      <p class="success" *ngIf="successMsg">
        {{ 'specialistProfile.success' | translate }}
      </p>

    </form>
  </div>
</div>
