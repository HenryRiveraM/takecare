<div class="role-page">

  <div class="container">

    <h1>
      ¿Cómo te gustaría usar
      <span class="primary">Take Care</span>?
    </h1>

    <p>
      Selecciona la opción que mejor se adapte a tu situación.
    </p>

    <div class="role-cards">

      <div class="card"
            [class.selected]="selectedRole === 'patient'"
            (click)="selectRole('patient')">

        <div class="image">
          <img src="assets/images/paciente.png" alt="Paciente">
        </div>

        <h3>Necesito apoyo</h3>

        <p>
          Busco un terapeuta cualificado que me ayude a mejorar mi bienestar.
        </p>

      </div>


      <div class="card"
            [class.selected]="selectedRole === 'specialist'"
            (click)="selectRole('specialist')">

        <div class="image">
          <img src="assets/images/especialista.png" alt="Especialista">
        </div>

        <h3>Soy un especialista</h3>

        <p>
          Soy un profesional certificado que desea ayudar a pacientes.
        </p>

      </div>

    </div>

    <button class="continue"
            [disabled]="!selectedRole"
            (click)="continue()">
      Continuar
    </button>

  </div>

</div>
