<div class="login-page">

  <div class="login-card">

    <div class="login-header">

      <div class="icon">
        <span class="material-symbols-outlined">lock</span>
      </div>

      <h1>Tu espacio seguro comienza aquí</h1>

      <p>Take Care: Tu bienestar mental es nuestra prioridad.</p>

    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <span class="material-symbols-outlined">mail</span>
          <input type="email" formControlName="email" >
        </div>
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error">
          Email inválido
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <span class="material-symbols-outlined">lock</span>
            <input type="password" formControlName="password" placeholder="••••••••">
        </div>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
          Contraseña requerida (min. 8 caracteres)
        </div>
      </div>
      
      <div class="login-options">
        <label>
          <input type="checkbox">
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage || '' }}
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        <span *ngIf="isLoading">Cargando...</span>
        <span *ngIf="!isLoading">Iniciar Sesión</span>
      </button>
    </form>

    <div class="secure">

      <span class="material-symbols-outlined">verified_user</span>

      <p>Secure HTTPS Connection</p>

    </div>

  </div>

</div>
