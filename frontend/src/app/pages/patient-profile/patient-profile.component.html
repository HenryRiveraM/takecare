<div class="profile-page animate__fadeIn">
  
  <app-sidebar></app-sidebar>

  <div class="sidebar-overlay" 
       *ngIf="sidebarService.isOpen()" 
       (click)="sidebarService.close()">
  </div>

  <main class="form-container">

    <form [formGroup]="profileForm" (ngSubmit)="onSave()" class="form-shell">
      
      <div class="card">
        <button type="button" class="back-btn" (click)="goBackToProfile()">
          ← {{ 'patientProfile.back' | translate }}
        </button>

        <div class="profile-header">
          <div class="avatar">
            <img src="assets/images/paciente.png" alt="perfil paciente">
          </div>

          <div class="header-content">
            <span class="tag">{{ 'patientProfile.tag' | translate }}</span>
            <h1>{{ 'patientProfile.title' | translate }}</h1>
            <p class="subtitle">
              {{ 'patientProfile.subtitle' | translate }}
            </p>
          </div>
        </div>

        <div class="grid">
          <div class="field-group">
            <label>{{ 'patientProfile.fields.names' | translate }}</label>
            <div class="input-wrap">
              <span class="material-symbols-outlined">person</span>
              <input
                formControlName="names"
                [readonly]="!isEditing"
                [placeholder]="'patientProfile.placeholders.names' | translate">
            </div>
          </div>

          <div class="field-group">
            <label>{{ 'patientProfile.fields.firstLastname' | translate }}</label>
            <div class="input-wrap">
              <span class="material-symbols-outlined">badge</span>
              <input
                formControlName="firstLastname"
                [readonly]="!isEditing"
                [placeholder]="'patientProfile.placeholders.firstLastname' | translate">
            </div>
          </div>

          <div class="field-group">
            <label>{{ 'patientProfile.fields.secondLastname' | translate }}</label>
            <div class="input-wrap">
              <span class="material-symbols-outlined">badge</span>
              <input
                formControlName="secondLastname"
                [readonly]="!isEditing"
                [placeholder]="'patientProfile.placeholders.secondLastname' | translate">
            </div>
          </div>

          <div class="field-group">
            <label>{{ 'patientProfile.fields.email' | translate }}</label>
            <div class="input-wrap readonly-wrap">
              <span class="material-symbols-outlined">mail</span>
              <input
                formControlName="email"
                readonly
                class="readonly-field"
                [placeholder]="'patientProfile.placeholders.email' | translate">
            </div>
          </div>
        </div>

        <div class="actions" *ngIf="!isEditing">
          <button class="btn-primary" type="button" (click)="toggleEdit()">
            {{ 'patientProfile.actions.edit' | translate }}
          </button>
        </div>

        <div class="actions" *ngIf="isEditing">
          <button class="btn-secondary" type="button" (click)="toggleEdit()">
            {{ 'patientProfile.actions.cancel' | translate }}
          </button>

          <button class="btn-primary" type="submit" [disabled]="profileForm.invalid || isLoading">
            {{ isLoading ? ('patientProfile.actions.saving' | translate) : ('patientProfile.actions.save' | translate) }}
          </button>
        </div>

      </div>
    </form>
  </main>
</div>
