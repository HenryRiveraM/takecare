<div class="recovery-wrapper">
  <div class="recovery-card">
    
    <div *ngIf="!isSent; else successTemplate">
      <div class="header-icon">
        <i class="fas fa-key"></i>
      </div>
      
      <h1>Recuperar contraseña</h1>
      <p class="subtitle">No te preocupes, dinos el correo asociado a tu cuenta y te enviaremos las instrucciones</p>

      <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()">
        <div class="input-container">
          <label>Correo Electrónico</label>
          <div class="field" [class.error]="submitted && f['email'].errors">
            <i class="far fa-envelope"></i>
            <input type="email" placeholder="example@email.com" formControlName="email">
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="isLoading">
          {{ isLoading ? 'Enviando...' : 'Enviar enlace' }}
        </button>

        <div class="back-link">
          <a routerLink="/login"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
        </div>
      </form>
    </div>

    <ng-template #successTemplate>
      <div class="success-content animate__animated animate__fadeIn">
        <div class="header-icon success">
          <i class="fas fa-check"></i>
        </div>
        <h1>¡Correo enviado!</h1>
        <p class="subtitle">
          Hemos enviado un enlace de recuperación a <strong>{{ recoveryForm.value.email }}</strong>. 
          Por favor, revisa tu bandeja de entrada.
        </p>
        
        <button class="btn-submit" (click)="isSent = false">
          Intentar con otro correo
        </button>
        
        <div class="back-link">
          <a routerLink="/login">Volver al inicio de sesión</a>
        </div>
      </div>
    </ng-template>

  </div>
</div>
