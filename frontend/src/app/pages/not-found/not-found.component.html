<main class="w-full max-w-2xl mx-auto min-h-screen flex items-center justify-center p-4 bg-softPink">

  <section class="bg-white rounded-custom soft-shadow p-10 md:p-12 text-center">

    <div class="mb-8 flex justify-center">
      <div class="relative w-64 h-64 floating-illustration">
        <img
          src="assets/images/error404.png"
          alt="Error 404"
          class="w-full h-full object-contain"
        />
      </div>
    </div>

    <div class="space-y-4">
      <h1 class="text-7xl font-extrabold text-primary opacity-20">404</h1>

      <h2 class="text-2xl md:text-3xl font-bold text-gray-800">
        {{ 'notFound.title' | translate }}
      </h2>

      <p class="text-gray-500 max-w-md mx-auto">
        {{ 'notFound.text' | translate }}
      </p>
    </div>

    <div class="mt-10 flex flex-col sm:flex-row gap-4 justify-center">
      <a
        routerLink="/"
        class="px-8 py-3 bg-primary text-white rounded-custom shadow-lg hover:scale-105 transition"
      >
        {{ 'notFound.backHome' | translate }}
      </a>

      <a
        routerLink="/recover-password"
        class="px-8 py-3 bg-soft text-gray-700 rounded-custom hover:bg-[#ffecec] transition"
      >
        {{ 'notFound.contactSupport' | translate }}
      </a>
    </div>

  </section>

</main>
